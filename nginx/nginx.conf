server {
    listen 80;
    server_name localhost;

    # Nginx status (for Prometheus exporter)
    # Exporter will scrape http://nginx/nginx_status from inside the Docker network.
    location /nginx_status {
        stub_status;
        access_log off;

        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Frontend Nuxt
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend Django
    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
