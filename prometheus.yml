global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: django-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx_exporter:9113"]
