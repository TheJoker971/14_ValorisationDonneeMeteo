name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Backend deps (uv sync)
        working-directory: backend
        run: uv sync --frozen --extra dev

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps (npm ci)
        working-directory: frontend
        run: npm ci --legacy-peer-deps

  test:
    name: Run tests
    runs-on: ubuntu-24.04
    needs: [install]

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DEBUG: "False"
      SECRET_KEY: "ci-secret-key"
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Backend deps (uv sync)
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Install PostgreSQL client (pg_isready)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            pg_isready -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}" && exit 0
            sleep 2
          done
          echo "Database did not become ready in time" >&2
          exit 1

      - name: Migrate
        working-directory: backend
        run: uv run python manage.py migrate --noinput

      - name: Backend tests (pytest)
        working-directory: backend
        run: uv run pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps (npm ci)
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend tests (vitest)
        working-directory: frontend
        run: npm run test:unit

  lint:
    name: Run linter
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Backend deps (uv sync)
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Backend lint (ruff)
        working-directory: backend
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps (npm ci)
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend lint (eslint)
        working-directory: frontend
        run: npm run lint

  security:
    name: Run security scan
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Backend deps (uv sync)
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Backend dependency scan (pip-audit)
        working-directory: backend
        run: |
          uv run python -m ensurepip --upgrade
          uv run python -m pip install --disable-pip-version-check pip-audit
          uv run pip-audit

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps (npm ci)
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend dependency scan (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high

  docker_build:
    name: Build Docker images
    runs-on: ubuntu-24.04
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

  docker_push:
    name: Push Docker images (main only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: [docker_build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
