name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (deps + tests + lint + security)
    runs-on: ubuntu-24.04

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DEBUG: "False"
      SECRET_KEY: "ci-secret-key"
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Install PostgreSQL client (pg_isready)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            pg_isready -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}" && exit 0
            sleep 2
          done
          echo "Database did not become ready in time" >&2
          exit 1

      - name: Migrate
        working-directory: backend
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: uv run pytest

      - name: Run linter
        working-directory: backend
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Run security scan (pip-audit)
        working-directory: backend
        run: |
          uv run python -m pip install --disable-pip-version-check pip-audit
          uv run pip-audit

  frontend:
    name: Frontend (deps + tests + lint + security + build)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: frontend
        run: npm run test:unit

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run security scan (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build
        working-directory: frontend
        run: npm run build

